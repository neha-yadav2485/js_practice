<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project</title>
</head>
<body>
  <p>YouTube Subscribe Button</p>
  <button onclick="button()" class="sub-btn">Subscribe</button>
  <br>
  <br>

  <p>Rock Paper Scissors</p>

  <p>Amazon Shipping Calculator</p>
  <p>Orders under $40 = +$10 shipping</p>
  <p>Orders above $40 = FREE shipping</p>
  <button placeholder="cost"></button>

  <script>
    function button(){
      const btnElement = document.querySelector('.sub-btn');
      if(btnElement.innerHTML === 'Subscribe') {
        btnElement.innerHTML = 'Subscribed';
      }
      else{
        btnElement.innerHTML = 'Subscribe';
      }
    }
  </script>
</body>
</html>
