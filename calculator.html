<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    body{
      background-color: black;
    }
    button{
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background-color: grey;
      opacity: 0.8;
      padding: 20px;
      
    }
    .orange-btn{
      background-color: orange;
    }
    #display{
      width: 200px;
      height: 25px;
    }

  </style>
</head>
<body>
  <p>Calculator</p>
  <input type="text" id="display">
  <br><br>
  <button onclick="appendValue('1')">1</button>
  <button onclick="appendValue('2')">2</button>
  <button onclick="appendValue('3')">3</button>
  <button onclick="appendValue('+')" class="orange-btn">+</button>
  <br>
  <br>
  <button onclick="appendValue('4')">4</button>
  <button onclick="appendValue('5')">5</button>
  <button onclick="appendValue('6')">6</button>
  <button onclick="appendValue('-')" class="orange-btn">-</button>
  <br>
  <br>
  <button onclick="appendValue('7')">7</button>
  <button onclick="appendValue('8')">8</button>
  <button onclick="appendValue('9')">9</button>
  <button onclick="appendValue('*')" class="orange-btn">*</button>
  <br>
  <br>
  <button onclick="appendValue('0')">0</button>
  <button onclick="appendValue('.')">.</button>
  <button onclick="calculate('=')">=</button>
  <button onclick="appendValue('/')" class="orange-btn">/</button>
  <br>
  <br>
  <button onclick="clearCal()">Clear</button>
  
  <script>
    let calculation = '';

    function appendValue(value){
      calculation += value;
      //console.log(calculation);
      document.getElementById('display').value = calculation;
    }

    function calculate(){
      // console.log(eval(calculation));
      document.getElementById('display').value = eval(calculation);
    }

    function clearCal(){
      calculation ='';
      // console.log("cleared!")
      document.getElementById('display').value = calculation;
    }
  </script>
</body>
</html>
