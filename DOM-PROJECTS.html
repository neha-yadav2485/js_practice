<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project</title>
</head>
<body>
  <p>YouTube Subscribe Button</p>
  <button onclick="subscribe()" class="sub-btn">Subscribe</button>
  <br>
  <br>

  <p>Amazon Shipping Calculator</p>
  <p>Orders under $40 = +$10 shipping</p>
  <p>Orders above $40 = FREE shipping</p>
  <input placeholder="Cost of order" class="cost-btn" onkeydown="handleCostKeydown(event)">
  <button onclick="calculateTotal()">Calculate</button>
  <p class="cost-total"></p>

  <script>

    function handleCostKeydown(event){
      if(event.key === 'Enter') {
        calculateTotal();
      }
    }

    function calculateTotal(){
      const inputElement = document.querySelector('.cost-btn ');
      let cost = Number(inputElement.value);   //string to number
      if(cost < 40 ) {
        cost = cost + 10;
      }
      document.querySelector('.cost-total').innerHTML = `$${cost.toFixed(2)}`
    }
    function subscribe(){
      const btnElement = document.querySelector('.sub-btn');
      if(btnElement.innerHTML === 'Subscribe') {
        btnElement.innerHTML = 'Subscribed';
      }
      else{
        btnElement.innerHTML = 'Subscribe';
      }
    }
  </script>
</body>
</html>
