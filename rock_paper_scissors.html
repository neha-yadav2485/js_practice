<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game</title>
    <style>
      button{
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="rock()">Rock</button>
    <button onclick="paper()">Paper</button>
    <button onclick="scissor()">Scissors</button>
    <p id="scoreCard" onclick="updatedScore()">Wins: 0  Losses: 0  Ties: 0</p>
    <button onclick="reset()">Reset</button>

    <script>
      let computerMove='';
      let score = {
        wins: 0,
        losses: 0,
        ties: 0
      };

      function reset(){
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        updatedScore();
      }

      function updatedScore(){
        document.getElementById('scoreCard').innerHTML = `Wins: ${score.wins} Losses: ${score.losses} Ties: ${score.ties}`
      }
      function move() {
        const randomNumber = Math.random();
        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = "rock";
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = "paper";
        } else {
          computerMove = "scissor";
        }
      }
      function rock() {
        move();
        updatedScore();
        const msg = `You picked rock. Computer picked ${computerMove}.`;
        if (computerMove == "rock") {
          alert(`${msg} Tie.`);
          score.ties++
          updatedScore();
        } else if (computerMove == "paper") {
          alert(`${msg} You lose.`);
          score.losses++;
          updatedScore();
        } else {
          alert(`${msg} You win.`);
          score.wins++;
          updatedScore();
        }
      }

      function paper() {
        move();
        updatedScore();
        const msg = `You picked paper. Computer picked ${computerMove}.`;
        if (computerMove == "rock") {
          alert(`${msg} You win.`);
          score.wins++;
          updatedScore();
        } else if (computerMove == "paper") {
          alert(`${msg} Tie.`);
          score.ties++;
          updatedScore();
        } else {score.losses++;
          updatedScore();
          alert(`${msg} You lose.`);
        }
      }

      function scissor() {
        move();
        updatedScore();
        const msg = `You picked scissor. Computer picked ${computerMove}.`;
        if (computerMove == "rock") {
          alert(`${msg} You lose.`);
          score.losses++;
          updatedScore();
        } else if (computerMove == "paper") {
          alert(`${msg} You win.`);
          score.wins++;
          updatedScore();
        } else {
          alert(`${msg} Tie.`);
          score.ties++;
          updatedScore();
        }
      }
    </script>
  </body>
</html>
