<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project</title>
  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
    }
    .sub-btn{
      border-radius: 25px;
      background-color: black;
      color: white;
      font-weight: bold;
      padding: 10px 20px;
      font-size: 20px;
      border: none;
      cursor: pointer;
    }
    .is-subscribed{
      background-color: rgb(236, 233, 233);
      color: black;
    }
    .cost-btn{
      padding: 5px 5px;
      font-size: 20px;
    }
    .btn{
      padding: 11px 15px;
      background-color:green;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <p>YouTube Subscribe Button</p>
  <button onclick="subscribe()" class="sub-btn">Subscribe</button>
  <br>
  <br>

  <p>Amazon Shipping Calculator</p>
  <p>Orders under $40 = +$10 shipping</p>
  <p>Orders above $40 = FREE shipping</p>
  <input placeholder="Cost of order" class="cost-btn" onkeydown="handleCostKeydown(event)">
  <button onclick="calculateTotal()" class="btn">Calculate</button>
  <p class="cost-total"></p>

  <script>

    function handleCostKeydown(event){
      if(event.key === 'Enter') {
        calculateTotal();
      }
    }

    function calculateTotal(){
      const inputElement = document.querySelector('.cost-btn ');
      let cost = Number(inputElement.value);   //string to number
      if(cost < 40 ) {
        cost = cost + 10;
      }
      document.querySelector('.cost-total').innerHTML = `$${cost.toFixed(2)}`
    }
    function subscribe(){
      const btnElement = document.querySelector('.sub-btn');
      if(btnElement.innerText === 'Subscribe') {
        btnElement.innerHTML = 'Subscribed';
        btnElement.classList.add('is-subscribed');
      }
      else{
        btnElement.innerHTML = 'Subscribe';
        btnElement.classList.remove('is-subscribed');
      }
    }
  </script>
</body>
</html>
