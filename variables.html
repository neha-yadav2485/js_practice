<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variables</title>
    <style>
      button {
        border-radius: 5px;
        border: 1px solid black;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <br />
    <button onclick="cartQuantity()">Show Quantity</button>
    <button onclick="addToCart()">Add to Cart</button>
    <button onclick="add2()">+2</button>
    <button onclick="add3()">+3</button>
    <button onclick="remove()">Remove from cart</button>
    <button onclick="sub2()">-2</button>
    <!-- <button onclick="reset()">Reset Cart</button> -->
    <p class="cart-qnt">Cart Quantity:</p>

    <script>
      let cart_Quantity = 0;
      function cartQuantity() {
        document.querySelector(".cart-qnt").innerHTML =
          `Cart Quantity: ${cart_Quantity}`;
      }

      function addToCart() {
        cart_Quantity += 1;
        document.querySelector(".cart-qnt").innerHTML =
          `Cart Quantity: ${cart_Quantity}`;
      }

      function add2() {
        cart_Quantity += 2;
        document.querySelector(".cart-qnt").innerHTML =
          `Cart Quantity: ${cart_Quantity}`;
      }

      function add3() {
        cart_Quantity += 3;
        document.querySelector(".cart-qnt").innerHTML =
          `Cart Quantity: ${cart_Quantity}`;
      }

      // function reset(){
      //   cart_Quantity = 0;
      //   console.log('Cart is reset')
      //   document.querySelector('.cart-qnt').innerHTML =`Cart Quantity: ${cart_Quantity}`
      // }

      function remove() {
        cart_Quantity -= 1;
        document.querySelector(".cart-qnt").innerHTML =
          `Cart Quantity: ${cart_Quantity}`;
      }
      function sub2() {
        cart_Quantity -= 2;
        document.querySelector(".cart-qnt").innerHTML =
          `Cart Quantity: ${cart_Quantity}`;
      }

      //     or we can do is:
      //     function displayCartQuantity() {
      //   document.querySelector('.js-cart-quantity').innerHTML =
      //     `Cart Quantity: ${cartQuantity}`;
      // }
      // function add3() {
      //   cartQuantity += 3;
      //   displayCartQuantity();
      // }
      
    </script>
  </body>
</html>
