<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>

  <style>
    body{
      background-color: rgb(25, 25, 25);
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }
    button {
      cursor: pointer;
    }
    .title{
      font-size: 30px;
    }
    .move-icons{
      height: 50px;
    }
    .move-btn{
      background-color: transparent;
      border: 3px solid white;
      width: 120px;
      height: 120px;
      border-radius: 60px;
      margin-right: 10px;
      cursor: pointer;
    }

  </style>
</head>

<body>
  <p class="title">Rock Paper Scissors</p>

  <button onclick="playGame('rock')" class="move-btn"><img src="images/rock-emoji.png" alt="Rock" class="move-icons"></button>
  <button onclick="playGame('paper')" class="move-btn"><img src="images/paper-emoji.png" alt="Paper" class="move-icons"></button>
  <button onclick="playGame('scissor')" class="move-btn"><img src="images/scissors-emoji.png" alt="Scissors" class="move-icons"></button>

  <p id="display">You Win</p>

  <p id="scoreCard"></p>

  <button onclick="reset()">Reset</button>

  <script>
    let score = JSON.parse(localStorage.getItem('score')) || {
      wins: 0,
      losses: 0,
      ties: 0
    };

    updatedScore();

    function reset() {
      score = {
        wins: 0,
        losses: 0,
        ties: 0
      };

      localStorage.setItem('score', JSON.stringify(score));

      document.getElementById('display').innerHTML = '';
      updatedScore();
    }

    function updatedScore() {
      document.getElementById('scoreCard').innerHTML =
        `Wins: ${score.wins} | Losses: ${score.losses} | Ties: ${score.ties}`;
    }

    function getComputerMove() {
      const randomNumber = Math.random();

      if (randomNumber < 1 / 3) {
        return 'rock';
      } else if (randomNumber < 2 / 3) {
        return 'paper';
      } else {
        return 'scissor';
      }
    }

    function playGame(playerMove) {
      const computerMove = getComputerMove();
      let result = '';

      if (playerMove === computerMove) {
        result = 'Tie.';
        score.ties++;
      }
      else if (
        (playerMove === 'rock' && computerMove === 'scissor') ||
        (playerMove === 'paper' && computerMove === 'rock') ||
        (playerMove === 'scissor' && computerMove === 'paper')
      ) {
        result = 'You win.';
        score.wins++;
      }
      else {
        result = 'You lose.';
        score.losses++;
      }

      document.getElementById('display').innerHTML =
        `You picked ${playerMove}.<br>
         Computer picked ${computerMove}.<br>
         ${result}`;

      localStorage.setItem('score', JSON.stringify(score));

      updatedScore();
    }
  </script>
</body>
</html>
