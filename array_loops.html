<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arrays & Loops</title>
</head>
<body>
  <script>
    const array = [10, 20, 30];
    console.log(array);
    console.log(array[1])
    array[1] = 40;
    console.log(array);
    let arr = [1, 'hello', true, {name: 'neha'}, [1,2]];
    console.log(typeof arr); //it will be object only
    console.log(Array.isArray([1,2]))
    
    array.push(100)
    console.log(array)

    array.splice(0,1);
    console.log(array)

    //loops
    const nums = [1, 1, 3]
    let total = 0;

    for(let i=0; i<nums.length; i++){
      const num = nums[i]
      total += num;
    }
    console.log(total);

    const numsDouble = [];
    for (let i=0; i< nums.length; i++){
      const num = nums[i];
      numsDouble.push(num * 2);
    }
    console.log(numsDouble);

  </script>
</body>
</html>
